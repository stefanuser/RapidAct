  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      color: #0f172a;
      background: #f1f5f9;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Scrollbar hidden */
    ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

    /* App frame responsive */
    @media (max-width: 460px) {
      body { background: #fff; }
    }

    /* Animations */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .animate-spin { animation: spin 0.75s linear infinite; }
    .fade-in      { animation: fadeIn 0.2s ease both; }
    .slide-up     { animation: slideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1) both; }

    /* Form elements */
    input, select, textarea, button { font-family: inherit; font-size: inherit; }
    button { -webkit-tap-highlight-color: transparent; user-select: none; }
    * { -webkit-tap-highlight-color: transparent; }

    /* Range input */
    input[type=range] { cursor: pointer; }

    /* Remove autofill bg on iOS */
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 50px white inset; }
  </style>
