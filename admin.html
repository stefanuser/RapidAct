  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      height: 100%;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    #root { height: 100vh; display: flex; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Animations */
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .animate-spin { animation: spin 0.75s linear infinite; }
    .fade-in      { animation: fadeIn 0.18s ease both; }

    /* Form resets */
    button   { font-family: inherit; font-size: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    input, select, textarea { font-family: inherit; font-size: inherit; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 50px white inset; }
  </style>
