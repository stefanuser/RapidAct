<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RapidAct.ro — Video de prezentare</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #0b1220;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100%;
    }
    ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulseDot{ 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes scanBar { 0% { transform: translateY(-100%); } 100% { transform: translateY(700%); } }
    .ra-spin { animation: spin 1s linear infinite; }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#0b1220"/>
      <rect x="46" y="14" width="28" height="52" rx="6" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
      <rect x="50" y="22" width="20" height="3" rx="1.5" fill="#2563eb"/>
      <rect x="50" y="29" width="14" height="2" rx="1" fill="#cbd5e1"/>
      <rect x="50" y="34" width="20" height="2" rx="1" fill="#cbd5e1"/>
      <rect x="50" y="50" width="20" height="6" rx="3" fill="#10b981"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="video/phone.jsx"></script>
  <script type="text/babel" src="video/screens.jsx"></script>
  <script type="text/babel" src="video/scenes.jsx"></script>
  <script type="text/babel" src="video/app.jsx"></script>
</body>
</html>
